<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Flashcards</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --accent: #00d4ff;
            --text: #ffffff;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #status { text-align: center; padding: 20px; }
        .card {
            background: var(--card-bg);
            width: 85vw;
            max-width: 400px;
            height: 250px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
            font-size: 1.2rem;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        .controls { display: flex; gap: 20px; align-items: center; }
        .btn {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
        }
        .btn:disabled { opacity: 0.3; }
        .progress { color: #888; font-size: 0.9rem; }
        #app { display: none; flex-direction: column; align-items: center; }
    </style>
</head>
<body>

    <div id="status">
        <div id="loader">
            <h2 id="status-text">Creating your deck...</h2>
        </div>
        <button id="retry-btn" class="btn" style="display:none" onclick="location.reload()">Try Again</button>
    </div>

    <div id="app">
        <h3 id="topic-title" style="color: var(--accent); margin-bottom: 10px;">Topic</h3>
        <div class="card" id="card-content">Loading...</div>
        <div class="controls">
            <button class="btn" id="prev" onclick="changeCard(-1)"><i data-lucide="chevron-left"></i></button>
            <span class="progress" id="counter">0 / 0</span>
            <button class="btn" id="next" onclick="changeCard(1)"><i data-lucide="chevron-right"></i></button>
        </div>
    </div>

    <script>
        const apiKey = ""; // Set by environment
        let points = [];
        let index = 0;

        // Get topic from your existing local storage keys
        const plan = JSON.parse(localStorage.getItem('lumina_active_plan'));
        const chapterIdx = localStorage.getItem('lumina_active_chapter_index');
        const topic = plan ? plan.chapters[chapterIdx]?.title : "General Study";

        async function callAiWithRetry(prompt, retries = 5, delay = 1000) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                if (!response.ok) throw new Error("API Limit or Connection Issue");
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (err) {
                if (retries > 0) {
                    await new Promise(r => setTimeout(r, delay));
                    return callAiWithRetry(prompt, retries - 1, delay * 2);
                }
                throw err;
            }
        }

        async function init() {
            document.getElementById('topic-title').innerText = topic;
            
            const prompt = `Summarize the topic "${topic}" into a list of 8-10 short, simple study points. 
            Format the response as a simple bulleted list with '-' at the start of each line. 
            Keep each point under 15 words.`;

            try {
                const text = await callAiWithRetry(prompt);
                // Split text by lines starting with - or numbers
                points = text.split('\n')
                             .map(line => line.replace(/^[-*•\d.]+\s*/, '').trim())
                             .filter(line => line.length > 5);

                if (points.length === 0) throw new Error("Could not parse points");

                document.getElementById('status').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                updateUI();
            } catch (error) {
                document.getElementById('status-text').innerText = "Failed to load: " + error.message;
                document.getElementById('retry-btn').style.display = 'inline-block';
            }
        }

        function updateUI() {
            document.getElementById('card-content').innerText = points[index];
            document.getElementById('counter').innerText = `${index + 1} / ${points.length}`;
            document.getElementById('prev').disabled = index === 0;
            document.getElementById('next').innerHTML = index === points.length - 1 ? 
                '<i data-lucide="check"></i>' : '<i data-lucide="chevron-right"></i>';
            lucide.createIcons();
        }

        function changeCard(step) {
            index += step;
            if (index >= points.length) {
                alert("Deck complete!");
                index = points.length - 1;
                return;
            }
            if (index < 0) index = 0;
            updateUI();
        }

        window.onload = init;
    </script>
</body>
</html>
