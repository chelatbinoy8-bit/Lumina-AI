<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Guided Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7000ff;
            --accent-blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --success: #00ff88;
            --warning: #ffcc00;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .exam-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .question-area {
            flex: 1;
            padding: 40px 60px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--glass-border);
        }

        .exam-header {
            margin-bottom: 30px;
        }

        .exam-header p {
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            margin: 0;
        }

        .exam-header h1 {
            font-size: 1.8rem;
            margin: 10px 0;
            font-weight: 800;
        }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: var(--glass);
            border-radius: 2px;
            margin-top: 20px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-blue);
            width: 0%;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px var(--accent-blue);
        }

        .question-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 35px;
            border-radius: 24px;
            margin-bottom: 30px;
            animation: slideUp 0.5s ease-out;
            position: relative;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .question-type-badge {
            position: absolute;
            top: -12px;
            right: 30px;
            background: var(--accent-purple);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .question-text {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .options-grid {
            display: grid;
            gap: 15px;
        }

        .option-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 20px 24px;
            border-radius: 14px;
            color: white;
            text-align: left;
            cursor: pointer;
            transition: 0.2s all;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .option-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--accent-blue);
            transform: translateX(5px);
        }

        .option-btn.selected {
            background: rgba(112, 0, 255, 0.2);
            border-color: var(--accent-purple);
            box-shadow: inset 0 0 20px rgba(112, 0, 255, 0.2);
        }

        .free-response {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: white;
            padding: 24px;
            font-family: inherit;
            font-size: 1.05rem;
            box-sizing: border-box;
            resize: none;
            min-height: 150px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .free-response:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(255,255,255,0.07);
        }

        .guide-sidebar {
            width: 400px;
            background: rgba(255,255,255,0.01);
            display: flex;
            flex-direction: column;
            padding: 40px;
            backdrop-filter: blur(30px);
        }

        .guide-status {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--accent-blue);
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        #guide-content {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text-dim);
        }

        .hint-box {
            background: rgba(112, 0, 255, 0.08);
            border: 1px solid rgba(112, 0, 255, 0.3);
            border-left: 4px solid var(--accent-purple);
            padding: 24px;
            border-radius: 14px;
            margin-top: 30px;
            animation: fadeIn 0.8s ease;
            font-style: italic;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-action {
            background: var(--accent-blue);
            color: black;
            border: none;
            padding: 20px 30px;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.9rem;
        }

        .btn-action:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }

        .btn-action:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 212, 255, 0.1);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin-bottom: 30px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p id="loader-text" style="letter-spacing: 2px; font-weight: 600; font-size: 0.9rem; color: var(--accent-blue);">NEURAL SYNC IN PROGRESS...</p>
        <p style="color: var(--text-dim); margin-top: 10px; font-size: 0.8rem;">Synthesizing questions based on content depth.</p>
    </div>

    <div class="exam-layout">
        <div class="question-area">
            <div class="exam-header">
                <p id="subject-tag">Module</p>
                <h1 id="chapter-title">Guided Assessment</h1>
                <div class="progress-bar-container">
                    <div class="progress-fill" id="progress"></div>
                </div>
            </div>

            <div id="question-container"></div>

            <button class="btn-action" id="submit-btn" onclick="handleSubmit()">Validate Logic</button>
        </div>

        <div class="guide-sidebar">
            <div class="guide-status">
                <i data-lucide="brain-circuit" size="18"></i>
                Lumina Intelligence
            </div>
            <div id="guide-content">
                Preparing your cognitive evaluation. Each question is calibrated to your specific learning data.
            </div>
            <div id="hint-container"></div>
        </div>
    </div>

    <script>
        const plan = JSON.parse(localStorage.getItem('lumina_active_plan')) || { subject: "General Intelligence", chapters: [] };
        const groqKey = localStorage.getItem('lumina_groq_key');
        
        const activeChapterTitle = plan?.currentChapter || plan?.chapters?.find(c => !c.completed)?.title || "Core Concepts";
        const activeChapterDetails = plan?.currentDetails || plan?.chapters?.find(c => !c.completed)?.details || "Standard Assessment Principles";

        let questions = [];
        let currentIdx = 0;
        let selectedOption = null;

        function detectLanguage() {
            const text = (plan.subject + " " + activeChapterTitle + " " + activeChapterDetails).toLowerCase();
            if (/[\u0D00-\u0D7F]/.test(text) || text.includes('malayalam')) return 'malayalam';
            if (/[\u0900-\u097F]/.test(text) || text.includes('hindi')) return 'hindi';
            return 'english';
        }

        const currentLang = detectLanguage();

        // SCALED QUESTION LOGIC: More content = More questions (Min 5, Max 15)
        function calculateQuestionCount() {
            const detailLength = activeChapterDetails.length;
            if (detailLength > 3000) return 15;
            if (detailLength > 2000) return 12;
            if (detailLength > 1000) return 10;
            if (detailLength > 500) return 7;
            return 5; 
        }

        async function generateExam() {
            if (!groqKey) {
                document.getElementById('loader').innerHTML = "<p style='color:red'>Critical Error: API Key Missing.</p>";
                return;
            }

            const qCount = calculateQuestionCount();
            
            const systemPrompt = `You are Lumina, an advanced pedagogical AI.
            Generate exactly ${qCount} high-quality questions for the topic: "${activeChapterTitle}".
            
            RULES:
            1. MIXED FORMAT: Include 60% Multiple Choice (MCQ) and 40% Text-based reasoning.
            2. DEFINITION FOCUS: At least 2 questions must ask for the definition or core essence of a primary term in the text.
            3. HIERARCHY: Start with basic definitions, move to conceptual application, and end with a complex reasoning prompt.
            4. LANGUAGE: Generate in ${currentLang}.
            5. JSON ONLY: Output only a JSON object.
            
            JSON Structure:
            {
                "questions": [
                    {
                        "type": "mcq",
                        "badge": "Definition | Concept | Analysis",
                        "question": "string",
                        "options": ["str", "str", "str", "str"],
                        "correctIndex": number
                    },
                    {
                        "type": "text",
                        "badge": "Deep Reasoning",
                        "question": "string"
                    }
                ]
            }`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${groqKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: `CONTEXT DATA: Subject: ${plan.subject}. Topic: ${activeChapterTitle}. Study Material: ${activeChapterDetails}` }
                        ],
                        response_format: { type: "json_object" },
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const parsed = JSON.parse(data.choices[0].message.content);
                questions = parsed.questions;

                document.getElementById('loader').style.display = 'none';
                document.getElementById('subject-tag').innerText = plan.subject;
                document.getElementById('chapter-title').innerText = activeChapterTitle;
                renderQuestion();
            } catch (e) {
                console.error(e);
                document.getElementById('loader-text').innerText = "RETRYING NEURAL CONSTRUCTION...";
                setTimeout(generateExam, 3000);
            }
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            const container = document.getElementById('question-container');
            selectedOption = null;
            
            const btn = document.getElementById('submit-btn');
            btn.innerText = (currentIdx === questions.length - 1) ? "Finalize Mastery" : "Validate Logic";
            btn.disabled = false;
            btn.style.background = "var(--accent-blue)";

            let html = `
                <div class="question-card">
                    <div class="question-type-badge">${q.badge || 'Cognitive Task'}</div>
                    <div class="question-text">${q.question}</div>
            `;
            
            if (q.type === 'mcq') {
                html += `<div class="options-grid">
                    ${q.options.map((opt, i) => `
                        <button class="option-btn" onclick="selectOpt(${i}, this)">
                            <span style="opacity:0.4; font-weight:800">${String.fromCharCode(65+i)}</span>
                            <span>${opt}</span>
                        </button>
                    `).join('')}
                </div>`;
            } else {
                html += `<textarea id="text-answer" class="free-response" placeholder="Explain your reasoning or provide the definition here..."></textarea>`;
            }
            
            html += `</div>`;
            container.innerHTML = html;

            const progress = (currentIdx / questions.length) * 100;
            document.getElementById('progress').style.width = `${progress}%`;
            document.getElementById('hint-container').innerHTML = '';
            lucide.createIcons();
        }

        function selectOpt(idx, btn) {
            selectedOption = idx;
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        async function handleSubmit() {
            const q = questions[currentIdx];
            const btn = document.getElementById('submit-btn');

            if (q.type === 'mcq') {
                if (selectedOption === null) return;
                if (selectedOption === q.correctIndex) {
                    handleSuccess();
                } else {
                    btn.disabled = true;
                    getNudge(q, q.options[selectedOption]);
                }
            } else {
                const ans = document.getElementById('text-answer').value;
                if (ans.trim().length < 5) return;
                btn.disabled = true;
                evaluateTextResponse(q, ans);
            }
        }

        async function evaluateTextResponse(q, ans) {
            const hintContainer = document.getElementById('hint-container');
            hintContainer.innerHTML = '<div class="hint-box">Synthesizing response quality...</div>';
            
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${groqKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { role: "system", content: "You are Lumina. Critique the student's answer. If it's accurate and covers the core points, respond ONLY with 'PASS'. If it's missing depth or incorrect, provide a supportive nudge to help them improve. Be brief (1 sentence)." },
                            { role: "user", content: `Topic: ${activeChapterTitle}. Question: ${q.question}. Student Answer: ${ans}.` }
                        ]
                    })
                });
                const data = await response.json();
                const feedback = data.choices[0].message.content;
                
                if (feedback.toUpperCase().includes('PASS')) {
                    handleSuccess();
                } else {
                    hintContainer.innerHTML = `<div class="hint-box">${feedback}</div>`;
                    document.getElementById('submit-btn').disabled = false;
                }
            } catch (e) {
                handleSuccess(); 
            }
        }

        function handleSuccess() {
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Verification Success";
            btn.style.background = "var(--success)";
            
            setTimeout(() => {
                currentIdx++;
                if (currentIdx >= questions.length) finishExam();
                else renderQuestion();
            }, 1000);
        }

        async function getNudge(questionObj, chosenAnswer) {
            const hintContainer = document.getElementById('hint-container');
            hintContainer.innerHTML = '<div class="hint-box">Recalibrating perspective...</div>';
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${groqKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { role: "system", content: "Don't give the answer. Provide a subtle hint pointing to why the chosen answer is incorrect or what they should focus on. 1 sentence max." },
                            { role: "user", content: `Question: ${questionObj.question}. Correct Concept: ${questionObj.options[questionObj.correctIndex]}. Student Wrong Choice: ${chosenAnswer}.` }
                        ]
                    })
                });
                const data = await response.json();
                hintContainer.innerHTML = `<div class="hint-box">${data.choices[0].message.content}</div>`;
                document.getElementById('submit-btn').disabled = false;
            } catch (e) {
                document.getElementById('submit-btn').disabled = false;
            }
        }

        function finishExam() {
            const updatedPlan = JSON.parse(localStorage.getItem('lumina_active_plan')) || plan;
            const chapIdx = updatedPlan.chapters.findIndex(c => c.title === activeChapterTitle);
            if(chapIdx !== -1) updatedPlan.chapters[chapIdx].completed = true;
            
            localStorage.setItem('lumina_active_plan', JSON.stringify(updatedPlan));
            
            document.getElementById('progress').style.width = `100%`;
            document.getElementById('question-container').innerHTML = `
                <div class="question-card" style="text-align: center; padding: 60px 40px;">
                    <div style="background: rgba(0, 255, 136, 0.1); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px;">
                         <i data-lucide="award" size="40" style="color: var(--success);"></i>
                    </div>
                    <h2 style="font-size: 2rem; margin-bottom: 10px;">Mastery Established</h2>
                    <p style="color: var(--text-dim); margin-bottom: 40px; line-height: 1.6;">You have successfully navigated the ${questions.length} cognitive gates for <b>${activeChapterTitle}</b>. Your profile has been updated.</p>
                    <button class="btn-action" onclick="window.location.href='dashboard.html'">Sync to Dashboard</button>
                </div>`;
            lucide.createIcons();
        }

        window.onload = () => {
            lucide.createIcons();
            generateExam();
        };
    </script>
</body>
</html>
