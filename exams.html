<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Guided Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7000ff;
            --accent-blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --success: #00ff88;
            --warning: #ffcc00;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .exam-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .question-area {
            flex: 1;
            padding: 60px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--glass-border);
        }

        .exam-header {
            margin-bottom: 40px;
        }

        .exam-header p {
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            margin: 0;
        }

        .exam-header h1 {
            font-size: 1.8rem;
            margin: 10px 0;
            font-weight: 800;
        }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: var(--glass);
            border-radius: 2px;
            margin-top: 20px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-blue);
            width: 0%;
            transition: 0.5s ease;
            box-shadow: 0 0 10px var(--accent-blue);
        }

        .question-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 18px 24px;
            border-radius: 12px;
            color: white;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent-blue);
        }

        .option-btn.selected {
            background: rgba(112, 0, 255, 0.2);
            border-color: var(--accent-purple);
            box-shadow: inset 0 0 15px rgba(112, 0, 255, 0.3);
        }

        .guide-sidebar {
            width: 380px;
            background: rgba(255,255,255,0.01);
            display: flex;
            flex-direction: column;
            padding: 40px;
            backdrop-filter: blur(20px);
        }

        .guide-status {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-blue);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        #guide-content {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-dim);
            transition: color 0.3s;
        }

        .hint-box {
            background: rgba(112, 0, 255, 0.08);
            border: 1px solid rgba(112, 0, 255, 0.3);
            border-left: 4px solid var(--accent-purple);
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
            animation: fadeIn 0.6s ease;
            font-style: italic;
            color: var(--text-main);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-action {
            background: var(--accent-blue);
            color: black;
            border: none;
            padding: 18px 30px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-action:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
        }

        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 2px solid var(--glass-border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin-bottom: 24px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="letter-spacing: 1px; font-weight: 500; opacity: 0.8;">LUMINA IS AUTHENTICATING CONTEXT...</p>
    </div>

    <div class="exam-layout">
        <div class="question-area">
            <div class="exam-header">
                <p id="subject-tag">Subject</p>
                <h1 id="chapter-title">Guided Assessment</h1>
                <div class="progress-bar-container">
                    <div class="progress-fill" id="progress"></div>
                </div>
            </div>

            <div id="question-container">
                <!-- Question loads here -->
            </div>

            <button class="btn-action" id="submit-btn" onclick="checkAnswer()">Authenticate Reasoning</button>
        </div>

        <div class="guide-sidebar">
            <div class="guide-status">
                <i data-lucide="sparkles" size="16"></i>
                Lumina's Presence
            </div>
            <div id="guide-content">
                Take a breath. This isn't just a test; it's a verification of your internal model. Answer with clarity.
            </div>
            
            <div id="hint-container"></div>
        </div>
    </div>

    <script>
        const plan = JSON.parse(localStorage.getItem('lumina_active_plan'));
        const groqKey = localStorage.getItem('lumina_groq_key');
        
        const activeChapterTitle = plan?.currentChapter || "Core Principles";
        const activeChapterDetails = plan?.currentDetails || "";

        let questions = [];
        let currentIdx = 0;
        let selectedOption = null;

        async function generateExam() {
            if (!groqKey) {
                document.getElementById('loader').innerHTML = "<p>Please ensure your Lumina Key is active.</p>";
                return;
            }

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${groqKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {
                                role: "system",
                                content: `You are the Exam Module of Lumina. Your goal is to generate 5 precise, high-level multiple choice questions. 
                                STRICT RULE: Stay EXACTLY on the topic of ${activeChapterTitle}. Do not deviate. 
                                Format: Return ONLY valid JSON with keys: "questions" (array of objects with "question", "options" array of 4, "correctIndex").`
                            },
                            {
                                role: "user",
                                content: `Subject: ${plan.subject}. Topic: ${activeChapterTitle}. Contextual Details: ${activeChapterDetails}`
                            }
                        ],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const parsed = JSON.parse(data.choices[0].message.content);
                questions = parsed.questions || parsed.array || Object.values(parsed)[0];
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('subject-tag').innerText = plan.subject;
                document.getElementById('chapter-title').innerText = activeChapterTitle;
                renderQuestion();
            } catch (e) {
                console.error(e);
                document.getElementById('loader').innerHTML = "<p>Connection error. Lumina is retrying...</p>";
                setTimeout(generateExam, 3000);
            }
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            const container = document.getElementById('question-container');
            selectedOption = null;

            container.innerHTML = `
                <div class="question-card">
                    <div class="question-text">${q.question}</div>
                    <div class="options-grid">
                        ${q.options.map((opt, i) => `
                            <button class="option-btn" onclick="selectOpt(${i}, this)">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;

            const progress = ((currentIdx) / questions.length) * 100;
            document.getElementById('progress').style.width = `${progress}%`;
            document.getElementById('hint-container').innerHTML = '';
            document.getElementById('guide-content').innerText = "Focus on the relationship between the core variables of this problem.";
            lucide.createIcons();
        }

        function selectOpt(idx, btn) {
            selectedOption = idx;
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        async function checkAnswer() {
            if (selectedOption === null) return;

            const q = questions[currentIdx];
            if (selectedOption === q.correctIndex) {
                currentIdx++;
                if (currentIdx >= questions.length) {
                    finishExam();
                } else {
                    renderQuestion();
                }
            } else {
                getNudge(q, q.options[selectedOption]);
            }
        }

        async function getNudge(questionObj, chosenAnswer) {
            const hintContainer = document.getElementById('hint-container');
            hintContainer.innerHTML = '<div class="hint-box" style="opacity: 0.6;">Lumina is reflecting on your path...</div>';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${groqKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {
                                role: "system",
                                content: "You are Lumina. A student chose an incorrect answer. Your role is to guide them back without telling them they are wrong or giving the answer. Ask a philosophical or conceptual question related to the correct logic. Stay STRICTLY on the topic of the current question."
                            },
                            {
                                role: "user",
                                content: `Question: ${questionObj.question}. Topic: ${activeChapterTitle}. Correct concept: ${questionObj.options[questionObj.correctIndex]}. Their choice: ${chosenAnswer}.`
                            }
                        ]
                    })
                });

                const data = await response.json();
                const nudge = data.choices[0].message.content;
                hintContainer.innerHTML = `<div class="hint-box">${nudge}</div>`;
                document.getElementById('guide-content').innerText = "Consider this perspective...";
            } catch (e) {
                hintContainer.innerHTML = `<div class="hint-box">Re-examine the fundamental properties of ${activeChapterTitle}.</div>`;
            }
        }

        function finishExam() {
            // Update plan as completed
            const updatedPlan = {...plan};
            const chapIdx = updatedPlan.chapters.findIndex(c => c.title === activeChapterTitle);
            if(chapIdx !== -1) updatedPlan.chapters[chapIdx].completed = true;
            localStorage.setItem('lumina_active_plan', JSON.stringify(updatedPlan));

            document.getElementById('progress').style.width = `100%`;
            document.getElementById('question-container').innerHTML = `
                <div class="question-card" style="text-align: center; padding: 50px;">
                    <i data-lucide="check-circle" size="64" style="color: var(--success); margin-bottom: 24px;"></i>
                    <h2 style="font-size: 2rem; margin-bottom: 10px;">Authentication Successful</h2>
                    <p style="color: var(--text-dim); margin-bottom: 30px;">Your understanding of ${activeChapterTitle} is now part of your permanent foundation.</p>
                    <button class="btn-action" onclick="window.location.href='dashboard.html'">Evolve to next stage</button>
                </div>
            `;
            lucide.createIcons();
        }

        window.onload = () => {
            lucide.createIcons();
            generateExam();
        };
    </script>
</body>
</html>
