<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Deep Study Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7000ff;
            --accent-blue: #00d4ff;
            --accent-yellow: #ffd700;
            --accent-green: #00ff88;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --sidebar-w: 320px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: var(--sidebar-w);
            border-right: 1px solid var(--glass-border);
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 10;
        }

        .sidebar-header {
            font-weight: 800;
            font-size: 0.75rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #feedback-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .feedback-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 12px;
            animation: slideIn 0.3s ease-out;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 60px 40px;
            scroll-behavior: smooth;
        }

        .summary-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header { margin-bottom: 50px; }
        .header h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; line-height: 1.1; margin-top: 10px;}
        .header p { color: var(--accent-blue); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }

        .section-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-blue);
            margin: 60px 0 25px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mastery-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .definition-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .definition-item {
            background: var(--glass);
            padding: 20px;
            border-radius: 16px;
            border-left: 4px solid var(--accent-blue);
        }

        .definition-item strong { color: var(--accent-blue); display: block; margin-bottom: 5px; font-size: 1.1rem; }

        .deep-note {
            background: linear-gradient(135deg, rgba(112, 0, 255, 0.1), rgba(0, 212, 255, 0.05));
            border: 1px solid rgba(112, 0, 255, 0.3);
            padding: 25px;
            border-radius: 20px;
            margin: 30px 0;
            position: relative;
        }

        .deep-note-label {
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--accent-purple);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .essay-box {
            background: rgba(255, 215, 0, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        .essay-q { color: var(--accent-yellow); font-weight: 800; font-size: 1.1rem; margin-bottom: 15px; display: block; }
        .essay-a { color: #d0d0d0; font-size: 1rem; line-height: 1.8; }

        .point-row { display: flex; gap: 15px; margin-bottom: 18px; line-height: 1.6; }
        .point-bullet { color: var(--accent-purple); font-weight: 900; flex-shrink: 0; }

        #loading { text-align: center; padding: 120px 20px; }
        .spin { animation: rotate 2s linear infinite; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <i data-lucide="microscope" size="18"></i>
            Deep Research Engine
        </div>
        <div id="feedback-area">
            <div class="feedback-card">
                <strong>Current Objective:</strong>
                <p id="objective-text" style="margin-top:5px; color: var(--text-dim);">Parsing full verbatim data to build an exhaustive knowledge graph.</p>
            </div>
            <div id="status-update" class="feedback-card" style="border-color: var(--accent-purple);">
                <i data-lucide="loader-2" size="14" class="spin"></i> Syncing all data points...
            </div>
        </div>
        <button onclick="window.history.back()" style="margin-top: auto; background: var(--glass); border: 1px solid var(--glass-border); color: white; padding: 14px; border-radius: 14px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <i data-lucide="chevron-left" size="16"></i>
            Back
        </button>
    </aside>

    <main class="content-area">
        <div id="loading">
            <i data-lucide="zap" size="48" class="spin" style="color: var(--accent-yellow); margin-bottom: 24px;"></i>
            <h2 id="loading-text" style="font-weight: 800; font-size: 1.5rem;">Synthesizing Massive Knowledge Base...</h2>
            <p style="color: var(--text-dim); margin-top: 10px;">Mapping 100% of your provided notes into educational modules.</p>
        </div>

        <div class="summary-container" id="summary-content" style="display: none;">
            <header class="header">
                <p id="sub-tag">Academic Field</p>
                <h1 id="chapter-title">Chapter Title</h1>
            </header>
            
            <div id="dynamic-text"></div>
        </div>
    </main>

    <script>
        const groqKey = localStorage.getItem('lumina_groq_key');
        const plan = JSON.parse(localStorage.getItem('lumina_active_plan'));
        const activeIdx = parseInt(localStorage.getItem('lumina_active_chapter_index')) || 0;

        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            if (plan && plan.chapters && plan.chapters[activeIdx]) {
                const targetChapter = plan.chapters[activeIdx];
                document.getElementById('chapter-title').innerText = targetChapter.title;
                document.getElementById('sub-tag').innerText = plan.subject;
                await generateDeepNotes(targetChapter);
            } else {
                document.getElementById('loading').innerHTML = `<h3>Plan missing. Please regenerate roadmap.</h3>`;
            }
        });

        async function generateDeepNotes(chapter) {
            const systemPrompt = `You are a Global Academic Authority. 
            TASK: Transform the user's provided notes into a HYPER-DETAILED, EXHAUSTIVE, multi-module study guide.

            CRITICAL DIRECTIVES:
            1. FULL COVERAGE: You must look at EVERY detail provided in the "User Notes" below. If the notes cover 10 different sub-concepts, you must create 10 different sections. 
            2. ZERO TRUNCATION: Do not choose the most interesting part; include ALL parts. 
            3. EXPANSION: For every concept mentioned in the user notes, expand it with academic rigor (definitions, mechanisms, and importance).
            4. LENGTH REQUIREMENT: Aim for a high-volume output (1500+ words).

            REQUIRED JSON STRUCTURE:
            {
                "executive_overview": "A 400-word comprehensive introduction covering the entire scope of the notes.",
                "deep_dive_sections": [
                    { "title": "Sub-concept Title", "content": "3-5 paragraphs of dense explanation based on specific parts of the user's notes." }
                ],
                "technical_glossary": [
                    { "term": "Term", "definition": "Deep technical definition." }
                ],
                "structural_logic": "Explain the connection between all concepts found in the notes.",
                "mastery_points": ["Fact 1", "Fact 2", "Fact 3", "Fact 4", "Fact 5"],
                "exam_preparation": [
                    { "question": "Complex Question", "model_answer": "Full 500-word academic response." }
                ]
            }`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${groqKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: `Subject: ${plan.subject}. Topic: ${chapter.title}. User Notes to process fully: \n\n${chapter.details}` }
                        ],
                        response_format: { type: "json_object" },
                        temperature: 0.4,
                        max_tokens: 8000
                    })
                });

                const result = await response.json();
                const content = JSON.parse(result.choices[0].message.content);
                renderDeepContent(content);

            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerHTML = `<h3 style="color:red">Synthesis Error. Check API Key.</h3>`;
            }
        }

        function renderDeepContent(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('summary-content').style.display = 'block';
            document.getElementById('status-update').innerHTML = `<i data-lucide="check-circle" size="14" style="color:var(--accent-green)"></i> Knowledge Base Synced`;
            
            const container = document.getElementById('dynamic-text');
            let html = ``;

            // 1. Executive Overview
            html += `<div class="section-title"><i data-lucide="info"></i> Comprehensive Overview</div>`;
            html += `<div class="mastery-card" style="border-left: 4px solid var(--accent-purple);">${data.executive_overview}</div>`;

            // 2. Glossary
            if (data.technical_glossary && data.technical_glossary.length > 0) {
                html += `<div class="section-title"><i data-lucide="book-open"></i> Exhaustive Glossary</div>`;
                html += `<div class="definition-grid">`;
                data.technical_glossary.forEach(item => {
                    html += `<div class="definition-item"><strong>${item.term}</strong><p style="font-size:0.9rem; opacity:0.8;">${item.definition}</p></div>`;
                });
                html += `</div>`;
            }

            // 3. Deep Dives (The Core)
            html += `<div class="section-title"><i data-lucide="layers"></i> Multi-Module Deep Dive</div>`;
            data.deep_dive_sections.forEach(section => {
                html += `
                <div class="mastery-card">
                    <h3 style="margin-bottom: 15px; color: var(--accent-yellow); font-size: 1.3rem;">${section.title}</h3>
                    <div style="color: #e0e0e0; white-space: pre-wrap;">${section.content}</div>
                </div>`;
            });

            // 4. Structural Logic
            html += `<div class="deep-note">
                <span class="deep-note-label">Inter-Concept Connectivity</span>
                <p style="font-style: italic; opacity: 0.9;">${data.structural_logic}</p>
            </div>`;

            // 5. Mastery Points
            html += `<div class="section-title"><i data-lucide="check-circle-2"></i> High-Density Core Facts</div>`;
            html += `<div class="mastery-card">`;
            data.mastery_points.forEach(point => {
                html += `<div class="point-row"><span class="point-bullet">✦</span><div>${point}</div></div>`;
            });
            html += `</div>`;

            // 6. Exam Prep
            html += `<div class="section-title"><i data-lucide="award"></i> Analytical Assessment</div>`;
            data.exam_preparation.forEach((item, idx) => {
                html += `
                <div class="essay-box">
                    <span class="essay-q">Evaluation ${idx+1}: ${item.question}</span>
                    <div class="essay-a">${item.model_answer}</div>
                </div>`;
            });

            container.innerHTML = html;
            lucide.createIcons();
        }
    </script>
</body>
</html>
