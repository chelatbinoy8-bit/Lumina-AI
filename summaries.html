<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Smart Summaries</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7000ff;
            --accent-blue: #00d4ff;
            --accent-yellow: #ffd700;
            --accent-green: #00ff88;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --sidebar-w: 320px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: var(--sidebar-w);
            border-right: 1px solid var(--glass-border);
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 10;
        }

        .sidebar-header {
            font-weight: 800;
            font-size: 0.75rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #feedback-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .feedback-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 12px;
            animation: slideIn 0.3s ease-out;
            font-size: 0.9rem;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 60px 40px;
            scroll-behavior: smooth;
        }

        .summary-container {
            max-width: 850px;
            margin: 0 auto;
        }

        .header { margin-bottom: 50px; }
        .header h1 { font-size: 3rem; font-weight: 800; letter-spacing: -1px; }
        .header p { color: var(--accent-blue); font-weight: 700; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }

        .definition-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 20px;
            margin: 24px 0;
        }
        .definition-box strong { color: var(--accent-blue); font-size: 1.1rem; display: block; margin-bottom: 8px; }

        .extra-fact-box {
            border: 1px dashed var(--accent-purple);
            background: rgba(112, 0, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            margin: 24px 0;
        }
        .extra-fact-tag {
            color: var(--accent-purple);
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .main-point {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            line-height: 1.7;
            font-size: 1.05rem;
            color: #e0e0e0;
        }
        .point-bullet { color: var(--accent-purple); font-weight: 900; }

        .btn-quiz {
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 60px auto;
            transition: transform 0.2s;
        }

        #loading { text-align: center; padding: 120px 20px; }
        .spin { animation: rotate 2s linear infinite; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <i data-lucide="brain-circuit" size="18"></i>
            Chapter Intelligence
        </div>
        <div id="feedback-area">
            <div id="initial-instruction" class="feedback-card" style="color: var(--text-dim); border-style: dashed;">
                Preparing insights for your current topic...
            </div>
        </div>
        <button onclick="location.href='dashboard.html'" style="margin-top: auto; background: var(--glass); border: 1px solid var(--glass-border); color: white; padding: 14px; border-radius: 14px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <i data-lucide="arrow-left" size="16"></i>
            Back to Dashboard
        </button>
    </aside>

    <main class="content-area">
        <div id="loading">
            <i data-lucide="loader-2" size="48" class="spin" style="color: var(--accent-blue); margin-bottom: 24px;"></i>
            <h2 id="loading-text" style="font-weight: 700;">Analyzing Chapter Data...</h2>
        </div>

        <div class="summary-container" id="summary-content" style="display: none;">
            <header class="header">
                <p id="sub-tag">Loading...</p>
                <h1 id="chapter-title">Loading...</h1>
            </header>
            
            <div id="dynamic-text"></div>
            
            <button id="start-quiz-btn" class="btn-quiz" style="display: none;" onclick="startQuiz()">
                <i data-lucide="play-circle"></i>
                Start Assessment
            </button>
        </div>
    </main>

    <script>
        const groqKey = localStorage.getItem('lumina_groq_key');
        const plan = JSON.parse(localStorage.getItem('lumina_active_plan'));
        const activeIdx = parseInt(localStorage.getItem('lumina_active_chapter_index')) || 0;

        function isIndicScript(text) {
            const malayalam = /[\u0D00-\u0D7F]/;
            const hindi = /[\u0900-\u097F]/;
            return malayalam.test(text) || hindi.test(text);
        }

        const isIndic = isIndicScript(plan.subject);

        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            if (plan && plan.chapters && plan.chapters[activeIdx]) {
                const targetChapter = plan.chapters[activeIdx];
                document.getElementById('chapter-title').innerText = targetChapter.title;
                document.getElementById('sub-tag').innerText = plan.subject;
                
                if (isIndic) {
                    document.getElementById('loading-text').innerText = "Preparing Literary Analysis (Aashayam)...";
                }

                await generateSummaries(targetChapter);
            } else {
                window.location.href = 'dashboard.html';
            }
        });

        async function generateSummaries(chapter) {
            // Determine prompt based on language
            const systemPrompt = isIndic ? 
                `You are a literature expert. For the given Malayalam/Hindi chapter, provide an EXTENDED literary analysis.
                Rule 1: Focus on the "Aashayam" (Core Essence/Summary) in great detail.
                Rule 2: Include a dedicated section for the "Author/Kavi Profile".
                Rule 3: Provide 5-7 most important Essay-type questions and answers.
                Rule 4: NO QUIZ questions needed. Output JSON only.
                JSON Schema: {
                  "aashayam": "long narrative string",
                  "author": "string about author",
                  "essay_questions": [{"q": "", "a": ""}],
                  "key_points": ["point 1", "point 2"]
                }` :
                `You are an expert tutor. Create a study summary. Output JSON.
                JSON Schema: {
                  "definitions": [{"term":"", "definition":""}], 
                  "points": [{"text":"", "isHighlighted":true}], 
                  "extra_facts": [{"title":"", "text":""}], 
                  "narrative": "",
                  "quiz_questions": [{"question":"", "options":[], "correct_index":0, "explanation":""}]
                }`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${groqKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: `Subject: ${plan.subject}. Topic: ${chapter.title}. Context: ${chapter.details}` }
                        ],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const content = JSON.parse(data.choices[0].message.content);
                renderContent(content);

            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerHTML = `<h3 style="color:red">Failed to load summary. Check API Key.</h3>`;
            }
        }

        function renderContent(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('summary-content').style.display = 'block';
            const container = document.getElementById('dynamic-text');
            let html = ``;

            if (isIndic) {
                // Indic Style Layout (Aashayam focus)
                html += `<div class="extra-fact-box"><span class="extra-fact-tag">Author / Kavi Profile</span><p>${data.author}</p></div>`;
                
                html += `<h3 style="margin: 40px 0 20px; font-weight: 800; color: var(--accent-blue);">Aashayam (Chapter Summary)</h3>`;
                html += `<div style="line-height: 2; color: #eee; font-size: 1.15rem; background: rgba(255,255,255,0.02); padding: 30px; border-radius: 20px;">${data.aashayam}</div>`;

                html += `<h3 style="margin: 40px 0 20px; font-weight: 800; color: var(--accent-blue);">Key Highlights</h3>`;
                data.key_points.forEach((p, i) => {
                    html += `<div class="main-point"><span class="point-bullet">✦</span><div>${p}</div></div>`;
                });

                html += `<h3 style="margin: 40px 0 20px; font-weight: 800; color: var(--accent-blue);">Essay & Important Questions</h3>`;
                data.essay_questions.forEach((item, i) => {
                    html += `<div class="definition-box">
                        <strong style="color: var(--accent-yellow)">Q${i+1}: ${item.q}</strong>
                        <p style="margin-top:10px; opacity: 0.9;">${item.a}</p>
                    </div>`;
                });

                document.getElementById('initial-instruction').innerText = "Reading Mode: Literary Analysis and Aashayam focus.";
            } else {
                // Standard English Style (Same as before)
                if(data.definitions) {
                    html += `<h3 style="margin: 20px 0 10px; font-weight: 800; color: var(--accent-blue);">Key Terms</h3>`;
                    data.definitions.forEach(d => html += `<div class="definition-box"><strong>${d.term}</strong><p>${d.definition}</p></div>`);
                }
                if(data.points) {
                    html += `<h3 style="margin: 40px 0 20px; font-weight: 800; color: var(--accent-blue);">Core Concepts</h3>`;
                    data.points.forEach((p, i) => html += `<div class="main-point"><span class="point-bullet">${(i+1)}</span><div>${p.text}</div></div>`);
                }
                html += `<h3 style="margin: 40px 0 20px; font-weight: 800; color: var(--accent-blue);">Analysis</h3>`;
                html += `<div style="line-height: 1.8; color: #ccc;">${data.narrative}</div>`;
                
                document.getElementById('start-quiz-btn').style.display = 'flex';
                window.quizPool = data.quiz_questions; 
            }

            container.innerHTML = html;
            lucide.createIcons();
        }

        function startQuiz() {
            // Only enabled for non-Indic
            localStorage.setItem('lumina_current_quiz', JSON.stringify(window.quizPool));
            window.location.href = 'exams.html'; // Or show modal logic if you prefer
        }
    </script>
</body>
</html>
