<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Socratic Tutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #020203;
            --lumina-glow: rgba(112, 0, 255, 0.15);
            --accent-purple: #8b5cf6;
            --accent-blue: #0ea5e9;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 0% 0%, var(--lumina-glow) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(14, 165, 233, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
        }

        .chat-header {
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, var(--bg-dark), transparent);
            z-index: 10;
        }

        .lesson-info p { 
            font-size: 0.7rem; 
            color: var(--accent-blue); 
            margin: 0 0 4px 0; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: 700;
        }

        .lesson-info h2 { 
            font-size: 1.4rem; 
            margin: 0; 
            font-weight: 700; 
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 0 40px;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
            scrollbar-width: none; /* Firefox */
        }
        #chat-flow::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        /* Message Styling */
        .msg-wrapper {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .ai .msg-label { color: var(--accent-purple); }
        .user .msg-label { color: var(--accent-blue); align-self: flex-end; }

        .msg-content {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text-main);
            max-width: 90%;
            font-weight: 400;
        }

        .ai .msg-content {
            border-left: 2px solid var(--accent-purple);
            padding-left: 20px;
        }

        .user .msg-content {
            align-self: flex-end;
            text-align: right;
            border-right: 2px solid var(--accent-blue);
            padding-right: 20px;
            color: #cbd5e1;
        }

        /* Input Area */
        .input-wrapper {
            padding: 40px;
            position: relative;
        }

        .input-glass {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 8px 12px 8px 24px;
            transition: all 0.4s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .input-glass:focus-within {
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.1);
            transform: translateY(-2px);
        }

        input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 1rem;
            padding: 12px 0;
            outline: none;
            font-family: inherit;
        }

        input::placeholder { color: var(--text-dim); }

        .btn-send {
            background: var(--accent-purple);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .btn-send:hover {
            transform: scale(1.05) rotate(5deg);
            background: #9d7df7;
        }

        .btn-back {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 10px 18px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-back:hover { 
            background: rgba(255,255,255,0.05);
            color: white;
            border-color: var(--accent-blue);
        }

        .typing { 
            font-size: 0.75rem; 
            color: var(--accent-purple); 
            padding: 0 40px;
            margin-bottom: 15px;
            display: none;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .completion-card {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(6, 78, 59, 0.05));
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 35px;
            border-radius: 30px;
            text-align: center;
            margin: 40px 0;
            backdrop-filter: blur(10px);
        }

        .btn-complete {
            background: var(--success);
            color: #052e16;
            border: none;
            padding: 14px 28px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-complete:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="lesson-info">
                <p id="subject-label">Subject</p>
                <h2 id="lesson-title">Session Initiation</h2>
            </div>
            <button class="btn-back" onclick="handleExit()">
                <i data-lucide="x" size="18"></i> Finish Session
            </button>
        </div>

        <div id="chat-flow">
            <!-- Messages flow here -->
        </div>

        <div class="typing" id="typing-indicator">
            <span style="opacity: 0.6">Lumina is contemplating...</span>
        </div>

        <div class="input-wrapper">
            <form class="input-glass" onsubmit="sendMessage(event)">
                <input type="text" id="userInput" placeholder="Type your realization..." autocomplete="off">
                <button type="submit" class="btn-send">
                    <i data-lucide="arrow-up" size="20"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        let plan = JSON.parse(localStorage.getItem('lumina_active_plan'));
        const groqKey = localStorage.getItem('lumina_groq_key');
        
        const activeChapterTitle = plan.currentChapter || plan.chapters.find(c => !c.completed)?.title || plan.chapters[0].title;
        const activeChapterDetails = plan.currentDetails || plan.chapters.find(c => !c.completed)?.details || plan.chapters[0].details;
        const currentSubject = (plan.subject || "").toLowerCase();

        let chatHistory = [];

        document.getElementById('subject-label').innerText = plan.subject;
        document.getElementById('lesson-title').innerText = activeChapterTitle;

        async function initTutor() {
            if (!groqKey) {
                appendMessage('ai', "Authentication Missing: No API Key found in secure storage.");
                return;
            }

            let subjectSpecialization = "";
            
            if (["biology", "physics", "chemistry", "science"].some(s => currentSubject.includes(s))) {
                subjectSpecialization = `
                    SPECIFIC BEHAVIOR FOR SCIENCE:
                    1. Start with 1-2 vivid story-based examples or analogies.
                    2. Evolve these narratives throughout the chat. 
                    3. Only provide formal definitions/formulas once the student has "learned it perfectly" via analogies. 
                    4. Once conceptual mastery is reached, provide a technical summary for exam reference.
                `;
            } else if (currentSubject.includes("math")) {
                subjectSpecialization = `
                    SPECIFIC BEHAVIOR FOR MATH:
                    1. Use direct questioning and logical derivation.
                    2. Guide the student to "discover" the formula through small logic steps.
                `;
            }

            const systemPrompt = `
                You are Lumina, an ethereal and brilliant Socratic Tutor.
                CURRENT LESSON: "${activeChapterTitle}"
                LESSON CONTEXT: "${activeChapterDetails}"
                SUBJECT: "${currentSubject}"
                
                PEDAGOGICAL CORE:
                1. Never define first. Always evoke curiosity.
                2. Bridge unknown concepts to familiar life experiences.
                3. If the student errs, explore the logic of their error to reveal the truth.
                ${subjectSpecialization}
                4. Conclude only when mastery is absolute with: "[SESSION_COMPLETE]".
                
                Tone: Sophisticated, encouraging, and visionary. Start now.
            `;

            chatHistory.push({ role: "system", content: systemPrompt });
            await callGroq();
        }

        async function callGroq() {
            const typing = document.getElementById('typing-indicator');
            typing.style.display = 'block';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${groqKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: chatHistory,
                        temperature: 0.7,
                        max_tokens: 1500
                    })
                });

                const data = await response.json();
                let aiMsg = data.choices[0].message.content;
                
                if (aiMsg.includes("[SESSION_COMPLETE]")) {
                    aiMsg = aiMsg.replace("[SESSION_COMPLETE]", "").trim();
                    showCompletionUI();
                }

                chatHistory.push({ role: "assistant", content: aiMsg });
                appendMessage('ai', aiMsg);
            } catch (e) {
                appendMessage('ai', "My cosmic link has flickered. Please restate your last thought.");
            } finally {
                typing.style.display = 'none';
                const flow = document.getElementById('chat-flow');
                flow.scrollTop = flow.scrollHeight;
            }
        }

        function appendMessage(role, text) {
            const flow = document.getElementById('chat-flow');
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${role}`;
            
            const label = document.createElement('div');
            label.className = 'msg-label';
            label.innerText = role === 'ai' ? 'Lumina' : 'You';
            
            const content = document.createElement('div');
            content.className = 'msg-content';
            content.innerText = text;
            
            wrapper.appendChild(label);
            wrapper.appendChild(content);
            flow.appendChild(wrapper);
            
            flow.scrollTo({ top: flow.scrollHeight, behavior: 'smooth' });
        }

        async function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            appendMessage('user', text);
            input.value = '';
            chatHistory.push({ role: "user", content: text });
            
            await callGroq();
        }

        function showCompletionUI() {
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div');
            div.className = 'completion-card';
            div.innerHTML = `
                <div style="font-size: 2.5rem; margin-bottom: 10px;">✨</div>
                <h3 style="margin:0; color:var(--success); font-weight:800; font-size:1.5rem;">Knowledge Crystallized</h3>
                <p style="font-size:1rem; margin:15px 0; opacity:0.8; color:white;">You've reached the core of this concept. Ready to move forward?</p>
                <button class="btn-complete" onclick="markAsDone()">Mark as Mastered</button>
            `;
            flow.appendChild(div);
            setTimeout(() => {
                flow.scrollTo({ top: flow.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        function markAsDone() {
            plan.chapters = plan.chapters.map(c => {
                if (c.title === activeChapterTitle) return { ...c, completed: true };
                return c;
            });
            localStorage.setItem('lumina_active_plan', JSON.stringify(plan));
            window.location.href = 'dashboard.html';
        }

        function handleExit() {
            delete plan.currentChapter;
            delete plan.currentDetails;
            localStorage.setItem('lumina_active_plan', JSON.stringify(plan));
            window.location.href = 'dashboard.html';
        }

        window.onload = () => {
            lucide.createIcons();
            initTutor();
        };
    </script>
</body>
</html>
