<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Socratic Tutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7000ff;
            --accent-blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            border-left: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.01);
        }

        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
        }

        .lesson-info h2 { font-size: 1.1rem; margin: 0; font-weight: 800; }
        .lesson-info p { font-size: 0.75rem; color: var(--accent-blue); margin: 4px 0 0; text-transform: uppercase; letter-spacing: 1px; }

        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg { max-width: 80%; padding: 16px 20px; border-radius: 20px; line-height: 1.5; font-size: 0.95rem; position: relative; }
        .msg.ai { 
            align-self: flex-start; 
            background: var(--glass); 
            border: 1px solid var(--glass-border); 
            border-bottom-left-radius: 4px;
        }
        .msg.user { 
            align-self: flex-end; 
            background: var(--accent-purple); 
            color: white; 
            border-bottom-right-radius: 4px;
        }

        .input-area {
            padding: 25px 30px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
        }

        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 15px 20px;
            border-radius: 14px;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent-blue); }

        .btn-send {
            background: var(--accent-blue);
            color: #000;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .btn-send:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }

        .btn-back {
            background: none;
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
        }

        .typing { font-size: 0.8rem; color: var(--accent-blue); margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="lesson-info">
                <p id="subject-label">Subject</p>
                <h2 id="lesson-title">Loading Lesson...</h2>
            </div>
            <button class="btn-back" onclick="location.href='dashboard.html'">
                <i data-lucide="arrow-left" size="16"></i> Dashboard
            </button>
        </div>

        <div id="chat-flow">
            <!-- Messages appear here -->
        </div>

        <div class="typing" id="typing-indicator" style="padding: 0 30px;">Lumina is thinking...</div>

        <form class="input-area" onsubmit="sendMessage(event)">
            <input type="text" id="userInput" placeholder="Type your thought..." autocomplete="off">
            <button type="submit" class="btn-send">
                <i data-lucide="send" size="20"></i>
            </button>
        </form>
    </div>

    <script>
        const plan = JSON.parse(localStorage.getItem('lumina_active_plan'));
        const groqKey = localStorage.getItem('lumina_groq_key');
        
        // Find the first incomplete chapter or the last active one
        const activeChapter = plan.chapters.find(c => !c.completed) || plan.chapters[0];
        let chatHistory = [];

        document.getElementById('subject-label').innerText = plan.subject;
        document.getElementById('lesson-title').innerText = activeChapter.title;

        async function initTutor() {
            if (!groqKey) {
                appendMessage('ai', "Error: No API Key found. Please go back and initialize the engine.");
                return;
            }

            const systemPrompt = `
                You are a Socratic Tutor for the lesson: "${activeChapter.title}". 
                Lesson Details: "${activeChapter.details}".
                
                YOUR STRICT RULES:
                1. NEVER give the answer. 
                2. If the student makes a mistake (simple or hard), do NOT correct them immediately. Ask a question that makes them realize the inconsistency in their own logic.
                3. Use "Story Mode": Guide them through the lesson as a journey from start to finish.
                4. Your goal is to lead them to "Aha!" moments through inquiry.
                5. Keep responses concise and focused on exactly one concept at a time.
                6. Start the conversation by asking an intriguing opening question related to the beginning of this chapter.
            `;

            chatHistory.push({ role: "system", content: systemPrompt });
            await callGroq();
        }

        async function callGroq() {
            const typing = document.getElementById('typing-indicator');
            typing.style.display = 'block';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${groqKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: chatHistory,
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const aiMsg = data.choices[0].message.content;
                
                chatHistory.push({ role: "assistant", content: aiMsg });
                appendMessage('ai', aiMsg);
            } catch (e) {
                appendMessage('ai', "Connection lost. Please check your API key or network.");
            } finally {
                typing.style.display = 'none';
            }
        }

        function appendMessage(role, text) {
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerText = text;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        async function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            appendMessage('user', text);
            input.value = '';
            chatHistory.push({ role: "user", content: text });
            
            await callGroq();
        }

        // Start the session
        window.onload = () => {
            lucide.createIcons();
            initTutor();
        };
    </script>
</body>
</html>
