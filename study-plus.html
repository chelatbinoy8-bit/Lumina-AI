<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Study Plus Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7000ff;
            --accent-blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --error: #ff3b30;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 10%, rgba(112, 0, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
        }

        .maker-card {
            width: 95%;
            max-width: 600px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            backdrop-filter: blur(40px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            transition: max-width 0.5s ease;
        }

        .maker-card.dashboard-mode {
            max-width: 900px;
        }

        .view { display: none; animation: fadeIn 0.4s ease forwards; }
        .view.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { font-size: 1.8rem; margin-bottom: 10px; font-weight: 800; letter-spacing: -0.5px; }
        p.subtitle { color: var(--text-dim); margin-bottom: 30px; font-size: 0.95rem; line-height: 1.5; }

        #apiOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
        }

        .api-modal {
            background: #111;
            padding: 40px;
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            width: 420px;
            text-align: center;
        }

        .form-group { margin-bottom: 25px; text-align: left; }
        label { display: block; margin-bottom: 10px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; color: var(--accent-blue); }
        
        input[type="text"], input[type="date"], input[type="password"] {
            width: 100%;
            background: #121212;
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 14px;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        .upload-zone {
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            background: rgba(255,255,255,0.01);
        }

        .progress-track { background: var(--glass-border); height: 8px; border-radius: 10px; overflow: hidden; margin-top: 20px; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(to right, var(--accent-purple), var(--accent-blue)); transition: 0.4s ease; }
        .ai-status { font-size: 0.75rem; color: var(--accent-blue); margin-top: 12px; font-family: monospace; text-transform: uppercase; letter-spacing: 1px; }

        .btn-primary {
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1rem;
        }

        /* Dashboard Styles */
        .dash-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 16px; border: 1px solid var(--glass-border); }
        .stat-val { font-size: 1.4rem; font-weight: 800; color: var(--accent-blue); }
        .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }

        .chapter-list { max-height: 400px; overflow-y: auto; padding-right: 10px; }
        .chapter-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .checkbox {
            width: 24px; height: 24px; border: 2px solid var(--accent-purple); border-radius: 6px; cursor: pointer;
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
        }
        .checkbox.checked { background: var(--accent-purple); }
        .checkbox.checked::after { content: '✓'; color: white; font-weight: bold; }

        .error-box { background: rgba(255, 59, 48, 0.1); border: 1px solid var(--error); color: var(--error); padding: 15px; border-radius: 12px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div id="apiOverlay">
        <div class="api-modal">
            <i data-lucide="shield-check" size="40" style="color: var(--accent-purple); margin-bottom: 20px;"></i>
            <h3>Groq Authentication</h3>
            <p style="color: var(--text-dim); font-size: 0.85rem; margin: 10px 0 25px;">Enter your API key to enable Llama 3 Intelligence.</p>
            <div class="form-group">
                <input type="password" id="groqKeyInput" placeholder="gsk_xxxxxxxxxxxxxx">
            </div>
            <button class="btn-primary" onclick="saveKey()">Initialize Engine</button>
        </div>
    </div>

    <div class="ambient-bg"></div>

    <div class="maker-card" id="mainCard">
        <!-- View 1: Setup -->
        <div class="view active" id="view-setup">
            <h2>Set Your Milestone</h2>
            <p class="subtitle">Tell Lumina what you are studying and when you need to finish.</p>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="subjectInput" placeholder="e.g. History, Physics...">
            </div>
            <div class="form-group">
                <label>Goal Date</label>
                <input type="date" id="goalDate">
            </div>
            <button class="btn-primary" onclick="showView('view-import')">Continue <i data-lucide="chevron-right" size="18"></i></button>
        </div>

        <!-- View 2: Import -->
        <div class="view" id="view-import">
            <h2>Import Syllabus</h2>
            <p class="subtitle">Upload a .txt file for AI processing.</p>
            <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
                <i data-lucide="upload-cloud" size="48" style="color: var(--accent-blue); margin-bottom: 15px;"></i>
                <div style="font-weight: 700;">Select .txt Syllabus</div>
                <input type="file" id="fileInput" hidden onchange="handleFile(this)" accept=".txt">
            </div>
            <div id="processingSection" style="display: none;">
                <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
                <div class="ai-status" id="aiStatus">Connecting to Groq...</div>
            </div>
            <div id="errorDisplay" class="error-box"></div>
            <button class="btn-primary" style="background: transparent; border: 1px solid var(--glass-border); margin-top: 20px;" onclick="showView('view-setup')">Back</button>
        </div>

        <!-- View 3: Dashboard -->
        <div class="view" id="view-dashboard">
            <div class="dash-header">
                <div>
                    <h2 id="dashTitle">Roadmap</h2>
                    <p id="dashMeta" style="color: var(--accent-blue); font-size: 0.8rem; font-weight: 700;"></p>
                </div>
                <button onclick="resetApp()" style="background: none; border: 1px solid var(--glass-border); color: var(--text-dim); padding: 8px 12px; border-radius: 10px; cursor: pointer;">Reset</button>
            </div>
            <div class="stat-grid">
                <div class="stat-card"><div class="stat-val" id="st1">0</div><div class="stat-label">Tasks</div></div>
                <div class="stat-card"><div class="stat-val" id="st2">0</div><div class="stat-label">Left</div></div>
                <div class="stat-card"><div class="stat-val" id="st3">0%</div><div class="stat-label">Progress</div></div>
            </div>
            <div class="chapter-list" id="chapterList"></div>
        </div>
    </div>

    <script>
        let groqApiKey = localStorage.getItem('lumina_groq_key') || "";
        let activePlan = JSON.parse(localStorage.getItem('lumina_active_plan'));

        window.onload = () => {
            lucide.createIcons();
            if(!groqApiKey) document.getElementById('apiOverlay').style.display = 'flex';
            else document.getElementById('apiOverlay').style.display = 'none';
            
            if(activePlan) renderDashboard();
        };

        function saveKey() {
            const val = document.getElementById('groqKeyInput').value.trim();
            if(!val.startsWith('gsk_')) return alert("Invalid Key");
            localStorage.setItem('lumina_groq_key', val);
            groqApiKey = val;
            document.getElementById('apiOverlay').style.display = 'none';
        }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            lucide.createIcons();
        }

        async function handleFile(input) {
            if(!input.files[0]) return;
            const text = await input.files[0].text();
            document.getElementById('processingSection').style.display = 'block';
            process(text);
        }

        async function process(syllabus) {
            const subject = document.getElementById('subjectInput').value;
            const date = document.getElementById('goalDate').value;
            updateStatus("Llama 3 Analyzing...", 45);

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${groqApiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "Planner. JSON output: { 'chapters': [{ 'title': string, 'details': string, 'completed': false }] }" },
                            { role: "user", content: `Plan ${subject} by ${date}. Syllabus: ${syllabus}` }
                        ],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const planData = JSON.parse(data.choices[0].message.content);
                
                activePlan = { subject, targetDate: date, chapters: planData.chapters };
                localStorage.setItem('lumina_active_plan', JSON.stringify(activePlan));
                
                updateStatus("Complete!", 100);
                setTimeout(() => renderDashboard(), 500);
            } catch (e) {
                document.getElementById('errorDisplay').innerText = e.message;
                document.getElementById('errorDisplay').style.display = 'block';
            }
        }

        function renderDashboard() {
            document.getElementById('mainCard').classList.add('dashboard-mode');
            document.getElementById('dashTitle').innerText = activePlan.subject;
            document.getElementById('dashMeta').innerText = "FINISH BY " + activePlan.targetDate;
            
            const list = document.getElementById('chapterList');
            list.innerHTML = '';
            let done = 0;
            
            activePlan.chapters.forEach((ch, i) => {
                if(ch.completed) done++;
                const item = document.createElement('div');
                item.className = 'chapter-item';
                item.style.opacity = ch.completed ? '0.5' : '1';
                item.innerHTML = `
                    <div class="checkbox ${ch.completed ? 'checked' : ''}" onclick="toggle(${i})"></div>
                    <div>
                        <div style="font-weight: 700;">${ch.title}</div>
                        <div style="font-size: 0.8rem; color: var(--text-dim);">${ch.details}</div>
                    </div>
                `;
                list.appendChild(item);
            });

            document.getElementById('st1').innerText = activePlan.chapters.length;
            document.getElementById('st2').innerText = activePlan.chapters.length - done;
            document.getElementById('st3').innerText = Math.round((done / activePlan.chapters.length) * 100) + "%";
            
            showView('view-dashboard');
        }

        function toggle(i) {
            activePlan.chapters[i].completed = !activePlan.chapters[i].completed;
            localStorage.setItem('lumina_active_plan', JSON.stringify(activePlan));
            renderDashboard();
        }

        function resetApp() {
            localStorage.removeItem('lumina_active_plan');
            location.reload();
        }

        function updateStatus(msg, prog) {
            document.getElementById('aiStatus').innerText = msg;
            document.getElementById('progressBar').style.width = prog + '%';
        }
    </script>
</body>
</html>
